name: Playwright Regression Pipeline
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Grant permissions to write/deploy reports to GitHub Pages if desired
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  automation-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Execution Context
      uses: actions/checkout@v4

    - name: Setup Node.js Runtime environment
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install Project Dependencies
      run: npm ci

    - name: Get Playwright Binary Version
      id: playwright-version
      run: echo "PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")" >> $GITHUB_ENV

    - name: Cache Playwright Browser Binaries
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright Browsers (If Cache Misses)
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps

    - name: Execute Automated Test Harness
      run: npx playwright test

    - name: Archive Test Execution Report Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-execution-report
        path: playwright-report/
        retention-days: 30